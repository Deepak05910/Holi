<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi 🌈</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
padding:40px 15px;
background: linear-gradient(45deg,#ff0080,#ffea00,#00bfff,#00ff7f);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
overflow-x:hidden;
position:relative;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.wrapper{
display:flex;
justify-content:center;
align-items:center;
gap:50px;
flex-wrap:wrap;
max-width:1200px;
margin:auto;
position:relative;
z-index:5;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
width:100%;
max-width:380px;
color:white;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.2);
position:relative;
z-index:5;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff0080;
color:white;
font-weight:bold;
cursor:pointer;
}

.big-name{
margin-top:20px;
font-size:26px;
font-weight:bold;
min-height:40px;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
margin:0 auto 20px;
overflow:hidden;
border:4px solid white;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.message-text{
font-size:15px;
line-height:1.6;
}

.bowl{
width:160px;
margin-top:20px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
pointer-events:none;
}

.floating{
position:fixed;
width:110px;
z-index:2;
pointer-events:none;
opacity:0.9;
}

/* MOBILE */
@media(max-width:768px){
.wrapper{flex-direction:column;gap:30px;}
.card{padding:25px;}
.bowl{width:120px;}
.big-name{font-size:20px;}
.profile{width:90px;height:90px;}
.floating{width:70px;}
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- Floating color images -->
<img src="color1.png" class="floating">
<img src="color2.png" class="floating">
<img src="color3.png" class="floating">
<img src="color4.png" class="floating">
<img src="color5.png" class="floating">

<div class="wrapper">

<!-- LEFT CARD -->
<div class="card">
<h2>🌈 Happy Holi 💥</h2>

<input type="text" id="nameInput" placeholder="Enter Your for Gift🎁">
<button onclick="startHoli()">Submit</button>

<div class="big-name" id="bigName"></div>

<img src="bowl.png" class="bowl">
</div>

<!-- RIGHT CARD -->
<div class="card">
<div class="profile">
<img src="Deepak.jpg">
</div>

<h2>होली की हार्दिक शुभकामनाएँ 🎉</h2>

<div class="message-text">
आपको रंगों और खुशियों से भरी आनंदमय होली की शुभकामनाएँ! 🎉<br>
आपका जीवन रंगों, सुख और प्रेम से भर जाए 🌈।<br>
आपका उत्सव शानदार और यादगार रहे! 🎊
</div>
</div>

</div>

<audio id="music" src="holi.mp3" loop></audio>

<script>
// PARTICLE BACKGROUND
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
class Particle{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.size=Math.random()*6+2;
this.speedX=(Math.random()-0.5)*2;
this.speedY=(Math.random()-0.5)*2;
this.color=["#ff0080","#ffea00","#00bfff","#00ff7f","#ff4500"][Math.floor(Math.random()*5)];
}
update(){
this.x+=this.speedX;
this.y+=this.speedY;
if(this.x<0||this.x>canvas.width)this.speedX*=-1;
if(this.y<0||this.y>canvas.height)this.speedY*=-1;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle=this.color;
ctx.fill();
}
}

for(let i=0;i<100;i++){particles.push(new Particle());}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{p.update();p.draw();});
requestAnimationFrame(animate);
}
animate();

// SUBMIT FUNCTION
function startHoli(){
const name=document.getElementById("nameInput").value.trim();
if(name==="") return;

document.getElementById("bigName").textContent="Happy Holi, "+name+"!";
document.getElementById("music").play();

document.getElementById("nameInput").style.display="none";
document.querySelector("button").style.display="none";
}

// FLOATING IMAGES MOVEMENT
const floatImages=document.querySelectorAll('.floating');

floatImages.forEach(img=>{
img.style.left=Math.random()*(window.innerWidth-150)+"px";
img.style.top=Math.random()*(window.innerHeight-150)+"px";

let speedX=(Math.random()-0.5)*1.5;
let speedY=(Math.random()-0.5)*1.5;

function move(){
let x=parseFloat(img.style.left);
let y=parseFloat(img.style.top);

x+=speedX;
y+=speedY;

if(x<=0||x>=window.innerWidth-img.width) speedX*=-1;
if(y<=0||y>=window.innerHeight-img.height) speedY*=-1;

img.style.left=x+"px";
img.style.top=y+"px";

requestAnimationFrame(move);
}
move();
});
</script>

</body>
</html>
