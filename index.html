<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi 🌈</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(45deg,#ff0080,#ffea00,#00bfff,#00ff7f);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* MAIN WRAPPER */
.wrapper{
display:flex;
gap:40px;
z-index:5;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
width:350px;
color:white;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.2);
position:relative;
z-index:5;
position:relative;
}

/* LEFT CARD */
input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff0080;
color:white;
font-weight:bold;
cursor:pointer;
}

.big-name{
margin-top:20px;
font-size:32px;
font-weight:bold;
min-height:40px;
}

/* RIGHT CARD */
.profile{
width:120px;
height:120px;
border-radius:50%;
margin:0 auto 20px;
overflow:hidden;
border:4px solid white;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.message-text{
font-size:14px;
line-height:1.6;
}

/* BOWL IMAGE */
.bowl{
width:120px;
margin-top:20px;
}

/* FLOATING COLOR IMAGES */
.floating{
position:fixed;
width:120px;
z-index:2;
pointer-events:none;
}

@keyframes moveAround{
0%{transform:translate(0,0);}
25%{transform:translate(300px,-200px);}
50%{transform:translate(-200px,300px);}
75%{transform:translate(250px,150px);}
100%{transform:translate(0,0);}
}

@keyframes float{
0%{transform:translateY(0px) rotate(0deg);}
50%{transform:translateY(-20px) rotate(180deg);}
100%{transform:translateY(0px) rotate(360deg);}
}

/* PARTICLE CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:1;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<!-- Floating colors -->
<img src="color1.png" class="floating" style="top:-30px; left:-30px;">
<img src="color2.png" class="floating" style="bottom:-30px; right:-20px;">
<img src="color3.png" class="floating" style="top:40%; left:-40px;">
<img src="color4.png" class="floating" style="top:20%; right:-40px;">
<img src="color5.png" class="floating" style="bottom:-40px; left:40%;">
<div class="wrapper">

<!-- LEFT CARD -->
<div class="card">
<h2>🌈 Celebrate Holi</h2>

<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="startHoli()">Submit</button>

<div class="big-name" id="bigName"></div>

<img src="bowl.png" class="bowl">



</div>


<!-- RIGHT CARD -->
<div class="card">
<div class="profile">
<img src="deepak.jpg">
</div>

<h2>होली की हार्दिक शुभकामनाएँ 🎉 🎉</h2>

<div class="message-text">
आपको रंगों और खुशियों से भरी आनंदमय होली की शुभकामनाएँ! 🎉 🎉<br>
आपका जीवन रंगों, सुख और प्रेम से भर जाए 🌈।
आपका उत्सव शानदार और यादगार रहे! 🎊
</div>

</div>

</div>

<audio id="music" src="holi.mp3" loop></audio>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

let particles=[];

class Particle{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.size=Math.random()*6+2;
this.speedX=(Math.random()-0.5)*2;
this.speedY=(Math.random()-0.5)*2;
this.color=["#ff0080","#ffea00","#00bfff","#00ff7f","#ff4500"][Math.floor(Math.random()*5)];
}
update(){
this.x+=this.speedX;
this.y+=this.speedY;
if(this.x<0||this.x>canvas.width)this.speedX*=-1;
if(this.y<0||this.y>canvas.height)this.speedY*=-1;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle=this.color;
ctx.fill();
}
}

for(let i=0;i<100;i++){
particles.push(new Particle());
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.update();
p.draw();
});
requestAnimationFrame(animate);
}
animate();

/* SUBMIT FUNCTION */
function startHoli(){
const name=document.getElementById("nameInput").value.trim();
if(name==="") return;

document.getElementById("bigName").textContent="Happy Holi, "+name+"!";

document.getElementById("music").play();

// Hide input & button
document.getElementById("nameInput").style.display="none";
document.querySelector("button").style.display="none";
}

// RANDOM FLOATING MOVEMENT
const floatImages = document.querySelectorAll('.floating');

floatImages.forEach(img => {

    img.style.left = Math.random() * (window.innerWidth - 100) + "px";
    img.style.top = Math.random() * (window.innerHeight - 100) + "px";

    let speedX = (Math.random() - 0.5) * 2;
    let speedY = (Math.random() - 0.5) * 2;

    function move() {

        let x = parseFloat(img.style.left);
        let y = parseFloat(img.style.top);

        x += speedX;
        y += speedY;

        if (x <= 0 || x >= window.innerWidth - 80) speedX *= -1;
        if (y <= 0 || y >= window.innerHeight - 80) speedY *= -1;

        img.style.left = x + "px";
        img.style.top = y + "px";

        requestAnimationFrame(move);
    }

    move();
});
</script>

</body>
</html>
